<!DOCTYPE html>
<html>
<head>
    <title>Web cua Ho Nhi Khang</title>
    <style>
        body { margin: 0; font-family: Arial; }

        /* menu */
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            color: yellow;
        }

        /* nội dung */
        .content {
            text-align: center;
            padding: 50px;
            background: lightblue;
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Giới thiệu</a>
        <a href="#">Liên hệ</a>
    </nav>

    <!-- CONTENT -->
    <div class="content">
        <h1>Hello 👋</h1>
        <p>Web có menu rồi 😎</p>
        <button onclick="alert('Hello bạn!')">Click</button>
    </div>

</body>
</html>
